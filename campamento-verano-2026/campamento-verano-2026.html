
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>En construcción</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .container { max-width: 420px; }

    .icon {
      width: 64px;
      height: 64px;
      background: #FAEEDA;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .badge {
      display: inline-block;
      padding: 5px 14px;
      background: #FAEEDA;
      color: #633806;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      color: #111;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 15px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .bar-wrap {
      width: 240px;
      height: 6px;
      background: #e0e0e0;
      border-radius: 999px;
      overflow: hidden;
      margin: 0 auto 2rem;
    }

    .bar-fill {
      height: 100%;
      width: 60%;
      background: #EF9F27;
      border-radius: 999px;
    }

    a {
      display: inline-block;
      padding: 10px 24px;
      border: 1px solid #ddd;
      border-radius: 8px;
      text-decoration: none;
      color: #111;
      font-size: 15px;
      background: #fff;
      transition: background 0.15s;
    }

    a:hover { background: #f0f0f0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
        <path d="M13.78 15.3L19.78 21.3L21.19 19.88L15.19 13.88L13.78 15.3ZM17.5 10C18.04 10 18.55 9.91 19.03 9.75L15.42 6.14L16.84 4.72L20.45 8.33C20.61 7.85 20.7 7.34 20.7 6.8C20.7 4.46 18.84 2.6 16.5 2.6C15.96 2.6 15.45 2.69 14.97 2.85L18.58 6.46L17.16 7.88L13.55 4.27C13.39 4.75 13.3 5.26 13.3 5.8C13.3 8.14 15.16 10 17.5 10ZM7.78 13.88L1.78 19.88L3.19 21.3L9.19 15.3L7.78 13.88ZM6.5 10C8.84 10 10.7 8.14 10.7 5.8C10.7 5.26 10.61 4.75 10.45 4.27L6.84 7.88L5.42 6.46L9.03 2.85C8.55 2.69 8.04 2.6 7.5 2.6C5.16 2.6 3.3 4.46 3.3 6.8C3.3 7.34 3.39 7.85 3.55 8.33L7.16 4.72L8.58 6.14L4.97 9.75C5.45 9.91 5.96 10 6.5 10Z" fill="#BA7517"/>
      </svg>
    </div>
    <span class="badge">En construcción</span>
    <h1>Estamos trabajando en algo nuevo</h1>
    <p>Esta página estará disponible pronto. Gracias por tu paciencia.</p>
    <div class="bar-wrap"><div class="bar-fill"></div></div>
    <a href="/">← Volver al inicio</a>
  </div>
</body>
</html>
